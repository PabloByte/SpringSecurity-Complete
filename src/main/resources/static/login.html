<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Sistema de Gestión</title>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-body">
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <img src="images/logo.jpg" alt="Emblema" class="emblem">
      <h1>Sistema de Asignacion de proyectos por ejecuciones</h1>
      <p class="sub-header">Recuerde confirmar su usuario y contraseña con su empleador</p>
    </div>

    <!-- Formulario -->
    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">Usuario:</label>
        <input type="text" id="username" name="username" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="login-btn">Iniciar Sesión</button>
    </form>

    <!-- Footer -->
    <div class="warning-footer">
      <p>PROPIEDAD DE INDUSTRIAS WAYNE</p>
    </div>
  </div>

  <!-- JS -->
  <script src="/js/login.js"></script>
</body>
</html>
