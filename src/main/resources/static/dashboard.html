<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - SpringWeb Admin</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-cogs"></i> Wayne Enterprise</h2>
      </div>
      <ul class="sidebar-menu">
        <li><a href="#" data-module="dashboard" class="menu-item active"><i class="fas fa-tachometer-alt"></i> Inicio</a></li>
        <li><a href="#" data-module="products" class="menu-item"><i class="fas fa-box"></i> Colaboradores </a></li>
        <li><a href="#" data-module="categories" class="menu-item"><i class="fas fa-tags"></i> Proyectos</a></li>
        <li><a href="#" data-module="suppliers" class="menu-item"><i class="fas fa-truck"></i> Tareas</a></li>
        <li><a href="#" data-module="settings" class="menu-item"><i class="fas fa-cog"></i> Settings</a></li>
        <li><a href="#" id="signOut" class="menu-item"><i class="fas fa-sign-out-alt"></i> Sign Out</a></li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <header class="content-header">
        <h1 id="pageTitle">Dashboard</h1>
        <div class="user-info">
          <span>Bienvenido, <span id="currentUser">Gothan Knight</span></span>
        </div>
      </header>

      <div id="contentArea" class="content-area">
        <!-- Aquí cargará contenido dinámico -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalTitle">Add Item</h2>
      <form id="modalForm">
        <div id="formFields"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" onclick="dashboard.closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
